<main class="main">
  <section class="section light-background blog-page">
    <div class="container section-title" data-aos="fade-up">
      <h2>Blog</h2>
      <p>Health articles and patient education.</p>
    </div>

    <div class="container" data-aos="fade-up" data-aos-delay="100">
      <div class="row gy-4">
        <div
          class="col-lg-4 col-md-6"
          *ngFor="let post of posts; let i = index"
          [attr.data-aos-delay]="100 + (i * 50)"
        >
          <div class="blog-card h-100">
            <img *ngIf="post.image" class="img-fluid blog-card-img" [src]="post.image" [alt]="post.title" loading="lazy">
            <div class="blog-card-body d-flex flex-column">
              <h3 class="blog-card-title">{{ post.title }}</h3>
              <p *ngIf="post.date" class="blog-card-date mb-2">{{ post.date }}</p>
              <p class="blog-card-excerpt">{{ post.excerpt }}</p>
              <a class="blog-readmore mt-auto" [routerLink]="['/blog', post.slug]">
                Read More »
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
