<main class="main">
  <section class="section light-background blog-details">
    <div class="container" data-aos="fade-up">
      <a class="btn btn-sm btn-outline-primary mb-3" routerLink="/blog">← Back to Blog</a>

      <ng-container *ngIf="post; else notFound">
        <div class="blog-details-card">
          <img *ngIf="post.image" class="img-fluid blog-details-img" [src]="post.image" [alt]="post.title" loading="lazy">

          <div class="blog-details-body">
            <h2 class="blog-details-title">{{ post.title }}</h2>
            <p *ngIf="post.date" class="blog-details-date mb-3">{{ post.date }}</p>

            <ng-container *ngIf="post.content?.length; else excerptOnly">
              <p class="blog-details-text" *ngFor="let para of post.content; trackBy: trackByIndex">{{ para }}</p>
            </ng-container>

            <ng-template #excerptOnly>
              <p class="blog-details-text">{{ post.excerpt }}</p>
            </ng-template>

            <!-- Full article content shown above -->
          </div>
        </div>
      </ng-container>

      <ng-template #notFound>
        <div class="alert alert-warning mb-0">
          Blog details not found.
        </div>
      </ng-template>
    </div>
  </section>
</main>
