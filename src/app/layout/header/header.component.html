<header id="header" class="header sticky-top">

  <div class="topbar d-flex align-items-center">
    <div class="container d-flex justify-content-center justify-content-md-between">
      <div class="contact-info d-flex align-items-center">
        <i class="bi bi-envelope d-flex align-items-center"><a href="mailto:jayeshpwaghulde&#64;gmail.com">jayeshpwaghulde&#64;gmail.com</a></i>
        <i class="bi bi-phone d-flex align-items-center ms-4"><span>+91 9922251176</span></i>
      </div>
      <div class="social-links d-none d-md-flex align-items-center">
        <a href="#" class="twitter"><i class="bi bi-twitter-x"></i></a>
        <a href="#" class="facebook"><i class="bi bi-facebook"></i></a>
        <a href="#" class="instagram"><i class="bi bi-instagram"></i></a>
        <a href="#" class="linkedin"><i class="bi bi-linkedin"></i></a>
      </div>
    </div>
  </div><!-- End Top Bar -->

  <div class="branding d-flex align-items-center">

    <div class="container position-relative d-flex align-items-center justify-content-between">
      <a href="/" class="logo d-flex align-items-center me-auto" (click)="scrollToSection('hero', $event)">
        <!-- Uncomment the line below if you also wish to use an image logo -->
        <!-- <img src="/img/logo.png" alt=""> -->
        <h1 class="sitename">Sunflower Hospital</h1>
      </a>

      <nav id="navmenu" class="navmenu">
        <ul *ngIf="!(isOnAdminRoute && isAdminLoggedIn); else adminMenu">
          <li><a href="#hero" class="active" (click)="scrollToSection('hero', $event)">Home<br></a></li>
          <li><a href="#about" (click)="scrollToSection('about', $event)">About</a></li>
          <li><a href="#services" (click)="scrollToSection('services', $event)">Blog</a></li>
          <li><a href="#doctors" (click)="scrollToSection('doctors', $event)">Doctors</a></li>
          <li><a href="#contact" (click)="scrollToSection('contact', $event)">Contact</a></li>
        </ul>

        <ng-template #adminMenu>
          <ul>
            <li><a href="#doctor-timing" (click)="scrollToAdminSection('doctor-timing', $event)">Doctor Timing</a></li>
            <li><a href="#reviews" (click)="scrollToAdminSection('reviews', $event)">Reviews</a></li>
            <li><a href="#enquiry" (click)="scrollToAdminSection('enquiry', $event)">Enquiry</a></li>
            <li><a href="/admin/login" (click)="logout($event)">Logout</a></li>
          </ul>
        </ng-template>
        <i class="mobile-nav-toggle d-xl-none bi bi-list"></i>
      </nav>

      <a
        class="cta-btn d-none d-sm-block"
        [routerLink]="isOnAdminRoute ? '/admin/dashboard' : '/'"
        [attr.href]="isOnAdminRoute ? '/admin/dashboard' : '#contact'"
        (click)="isOnAdminRoute ? $event.preventDefault() : scrollToSection('contact', $event)"
      >
        {{ isOnAdminRoute ? 'Admin Panel' : 'Make an Appointment' }}
      </a>

    </div>

  </div>

</header>
